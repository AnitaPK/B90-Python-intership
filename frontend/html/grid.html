<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .containerGrid{
            /* height: 600px;
            width: 700px; */
            background-color: pink;
            display: grid;
            grid-template-areas: ' n1 n1 n1 n1 n1'
                                  'asd s1 s2 s2 s2'
                                  'asd s3 s3 s3 s3'
                                  'asd s4 s4 s4 s4'
                                  'foo foo foo foo foo';
        }
        .nav{
            height: 100px;
            background-color: red;
            grid-area: n1;
        }
        .aside{
            background-color: orange;
            grid-area: asd;
            height: 90vh;
        }
        .sec1{
            background-color: blue;
            grid-area: s1;
        }
        .sec2{
            background-color: blueviolet;
            grid-area: s2;
        }
        .sec3{
            background-color: brown;
            grid-area: s3;
        }
        .sec4{
            background-color: chartreuse;
            grid-area: s4;
        }
        .footer{
            background-color: black;
            grid-area: foo;
            height: 200px;
        }
    </style>
</head>
<body>
    <div class="containerGrid">
        <div class="nav"></div>
        <div class="aside"></div>
        <div class="sec1"></div>
        <div class="sec2"></div>
        <div class="sec3"></div>
        <div class="sec4"></div>
<div class="footer"></div>
    </div>
</body>
</html>
