<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <style>
        .btnSkyBlue {
            background-color: #3f6481;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            color: white;
        }

        .btnLightBlue {
            background-color: #90a5ff;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            color: white;
        }

        .btnDarkBlue {
            background-color: #000047;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            color: white;
        }

        .circle1 {
            width: 20px;
            height: 20px;
            border: 1px solid #3f6481;
            border-radius: 50%;
            margin-right: 5px;
            cursor: pointer;
        }

        .lightBlue {
            background-color: #90a5ff;
        }

        .darkBlue {
            background-color: #000047;
        }

        .skyBlue {
            background-color: #3f6481;

        }
    </style>
</head>

<body>
    <h1>Hello, world!</h1>

    <div class="container">
        <div class="row">
            <div class="col">
                <div class="card" style="width: 24rem;">
                    <img src="./assets/skyblue.jpeg" class="card-img-top" alt="..." id="imgID">
                    <div class="card-body">
                        <h5 class="card-title" id="titleID">BMW iX1 (SKY BLUE)</h5>
                        <p class="card-text">Some quick example text to build on the card title and make up the bulk of
                            the card’s content.</p>
                        <button class="btnSkyBlue" id="btnID">Go somewhere</button>
                        <div class="d-flex mt-3">
                            <div class="circle1 lightBlue" id="lightCircle"></div>
                            <div class="circle1 darkBlue" id="darkCircle"></div>
                            <div class="circle1 skyBlue" id="skyCircle"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function lightCar() {
            document.getElementById("imgID").setAttribute("src", "./assets/lightBlue.jpeg")
            document.querySelector("#titleID").textContent = "BMW iX1 (LIGHT BLUE)"
            document.querySelector("#titleID").style.color = "#90a5ff"
            document.querySelector("#btnID").classList.remove("btnSkyBlue", "btnDarkBlue")
            document.querySelector("#btnID").classList.add("btnLightBlue")
        }

        document.querySelector("#lightCircle").addEventListener("click", lightCar)



        function darkCar() {
            document.getElementById("imgID").setAttribute("src", "./assets/blue.jpeg")
            document.querySelector("#titleID").textContent = "BMW iX1 (DARK BLUE)"
            document.querySelector("#titleID").style.color = "#000047"
            document.querySelector("#btnID").classList.remove("btnSkyBlue")
            document.querySelector("#btnID").classList.add("btnDarkBlue")
        }

        document.querySelector("#darkCircle").addEventListener("click", darkCar)


        function skyCar() {
            document.getElementById("imgID").setAttribute("src", "./assets/skyblue.jpeg")
            document.querySelector("#titleID").textContent = "BMW iX1 (SKY BLUE)"
            document.querySelector("#titleID").style.color = "#3f6481"
            document.querySelector("#btnID").classList.remove("btnLightBlue", "btnDarkBlue")
            document.querySelector("#btnID").classList.add("btnSkyBlue")


        }

        document.querySelector("#skyCircle").addEventListener("click", skyCar)

    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
